# AI Football Betting Analysis Configuration

llm:
  model: "gemma2:9b"
  ollama_host: "http://localhost:11434"
  max_concurrent: 2
  temperature: 0.3
  seed: 42
  timeout: 300

database:
  path: "data/database.db"

sportmonks:
  api_key: ""
  primary: false  # Disabled - using free scrapers instead

scraping:
  sources:
    - sportmonks
    - fbref
    - rss_news
  rate_limits:
    sportmonks: 1
    fbref: 3
    rss: 1
    sofascore: 12
  cache_dir: "~/.soccerdata"
  season: "2526"

scheduler:
  fixtures_interval: 3600
  stats_interval: 1800
  news_interval: 900
  lineups_interval: 600

news:
  sources:
    - name: "Sky Sports Football"
      url: "https://www.skysports.com/rss/12040"
    - name: "BBC Sport Football"
      url: "https://feeds.bbci.co.uk/sport/football/rss.xml"
    - name: "Guardian Football"
      url: "https://www.theguardian.com/football/rss"
  update_interval: 900
  cache_ttl: 600

dashboard:
  host: "0.0.0.0"
  port: 8000

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "data/logs/app.log"
